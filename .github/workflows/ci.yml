name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with py_compile
        run: |
          python -m py_compile labels/triple_barrier.py
          python -m py_compile risk/position_sizing.py
          python -m py_compile monitoring/validity_state_machine.py
          python -m py_compile paper_trading/engine.py
          python -m py_compile paper_trading/monitor.py
          python -m py_compile paper_trading/serve.py

      - name: Run tests
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ --cov=tests --cov-report=term-missing -v --tb=short
