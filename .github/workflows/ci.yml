name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check live dependency boundaries
        run: bash scripts/check_live_deps.sh

      - name: Lint with ruff
        run: |
          ruff check paper_trading/ --output-format=github
          ruff format paper_trading/ --check

      - name: Run tests
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          PYTHONPATH=$PYTHONPATH:. python -m pytest tests/ \
            --cov=paper_trading --cov-report=term-missing \
            --cov-fail-under=40 -v --tb=short
