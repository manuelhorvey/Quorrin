capital: 100000
position_size: 0.95
rebalance: daily
retrain_freq: annual
retrain_window: 5
research_mode: false

# ── Data Source ───────────────────────────────────────────────────────────────
# Options: "yfinance" (default) or "mt5"
data_source: mt5

# ── MT5 Integration ───────────────────────────────────────────────────────────
# Set enabled: true to use the Wine MT5 bridge for data and/or execution.
# The bridge server must be running (run: mt5-bridge).
# Credentials come from environment variables (MT5_ACCOUNT, MT5_PASSWORD, MT5_SERVER)
# or .env file — never commit them to version control.
mt5:
  enabled: true
  bridge_host: 127.0.0.1
  bridge_port: 9876
  symbol_map_path: configs/mt5_symbol_map.yaml

ensemble:
  enabled: false
  base_weight: 0.6
  threshold: 0.15
  regime_feature_window: 63
meta_labeling:
  confidence_threshold: 0.40
  threshold_reduced: 0.40
portfolio_drawdown_limit: -0.15
defaults:
  churn_ratio_threshold: 0.35
  cooldown_half_life_hours: 4.0
  cooldown_max_penalty_pct: 20.0
  entry_defer_max_bars: 5
  min_flip_interval_bars: 3
  entry_optimization:
    mom_max_pressure: 0.90
    mom_min_pressure: 0.10
    mr_extreme_high: 0.85
    mr_extreme_low: 0.15
    breakout_max_compression: 0.05
optimizations:
  truncate_inference: auto
  batch_http: true
  sqlite_state: true
  vectorized_labels: true
  async_diagnostics: true
  regime_conviction_flip_gate:
    enabled: true
    # Calibrated on 394 flips across 9 dashboard assets
    # (data/sandbox/{asset}/oos_predictions.parquet).
    # Regime bias in calibration sample: 62.8% trend, 33.8% range, 3.3% volatile.
    # In a ranging market the gate will block more flips — that's correct,
    # not a sign the threshold is wrong.
    regime_margin_threshold: 0.35
    confidence_threshold: 0.50
    min_bars_in_regime: 3

execution:
  governance:
    regime_geometry:
      GREEN:
        sl_mult: 0.60
        tp_mult: 0.70
      YELLOW:
        sl_mult: 0.60
        tp_mult: 0.70
      RED:
        sl_mult: 0.60
        tp_mult: 0.80
    liquidity_config:
      enabled: true
      regime_window: 21
      refresh_on_open: true
      volume_z_thin_threshold: -1.5
      volume_z_stressed_threshold: -2.5
      amihud_high_threshold: 1.5
      amihud_stressed_threshold: 3.0
      thin_sl_widen_pct: 15
      thin_size_reduce_pct: 15
      stressed_sl_widen_pct: 30
      stressed_size_reduce_pct: 30
      stressed_halt: true
    narrative_config:
      enabled: true
      fxstreet_url: "https://www.fxstreet.com/analysis"
      geopol_sl_widen_pct: 10
      risk_off_size_reduce_pct: 20
      min_confidence: 0.6
      auto_confirm_deadline_hour: 12
