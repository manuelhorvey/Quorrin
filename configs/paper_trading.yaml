capital: 100000
position_size: 0.95
rebalance: daily
retrain_freq: annual
retrain_window: 5
research_mode: false

# Training-window vol baselines (annualized); used for vol-target sizing floors
vol_baselines:
  NZDJPY: 0.0055
  CADJPY: 0.0048
  EURAUD: 0.0042
  GC: 0.0120
  BTC: 0.4500
  USDCAD: 0.0038
  AUDJPY: 0.0051
  GBPJPY: 0.0062
  USDJPY: 0.0049
  USDCHF: 0.0043
  GBPUSD: 0.0056
  EURUSD: 0.0048
  AUDUSD: 0.0059
  NZDUSD: 0.0061
  EURCAD: 0.0035
  CHFJPY: 0.0048
  DJI: 0.0081

# Execution physics / Liquidity models
execution_defaults:
  base_spread_bps: 0.5
  spread_vol_slope: 2.0
  spread_max_bps: 50.0
  impact_model: "square_root"
  impact_coeff: 0.1
  avg_daily_volume: 1000000000 # Default 1B notional

satellite:
  BTC:
    max_allocation_pct: 0.05
    vol_target: 0.40
    max_drawdown_pct: -0.25
    ticker: BTC-USD
    sl_mult: 0.58
    tp_mult: 1.51
    regime_sizing: true
    execution_config:
      base_spread_bps: 2.0
      spread_vol_slope: 3.0
      spread_max_bps: 150.0
      avg_daily_volume: 50000000000 # 50B
      impact_coeff: 0.05
    features: [rate_diff, 2y_yield_delta_63, vix_delta_5, dxy_mom_21, vix_ma21, btc_mom_10, btc_mom_21, btc_vs_spy_21, btc_mom_63, btc_vs_spy_63]

