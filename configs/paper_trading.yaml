capital: 100000
position_size: 0.95
rebalance: daily
retrain_freq: annual
retrain_window: 5
research_mode: false
data_source: mt5
mt5:
  enabled: true
  bridge_host: 127.0.0.1
  bridge_port: 9879
  min_lot: 0.05
  symbol_map_path: configs/mt5_symbol_map.yaml
# Ensemble is configured programmatically per-asset after regime model training.
# Config values here serve as global defaults for all assets.
ensemble:
  base_weight: 1.0
  threshold: 0.15
  regime_feature_window: 63
meta_labeling:
  confidence_threshold: 0.4
  threshold_reduced: 0.4
calibration:
  enabled: false
  method: binned
  n_bins: 10
  min_samples_per_bin: 5
  model_dir: paper_trading/models/calibration
kelly:
  enabled: false
  fraction: 0.25
  max_cap: 1.0
  min_edge: 0.0
portfolio_drawdown_limit: -0.15
portfolio:
  weight_method: risk_parity_v1
  factor_constraints:
    enabled: false
    risk_parity_weight: 0.7
    penalty_scale: 10.0
defaults:
  churn_ratio_threshold: 0.35
  cooldown_half_life_hours: 4.0
  cooldown_max_penalty_pct: 20.0
  entry_defer_max_bars: 5
  min_flip_interval_bars: 3
  min_confidence: 55.0
  max_entry_slippage_pct: 2.0
  profit_lock_threshold_pct: 15.0
  max_position_pct_of_equity: 0.15
  max_risk_per_trade_pct: 2.0
  min_viable_position_pct: 0.01
  size_taper_start_dd: -0.05
  size_taper_end_dd: -0.15
  size_taper_min: 0.50
  stacking:
    enabled: false
    dry_run: true
    max_layers: 3
    layer_multipliers: [0.8, 0.5, 0.3]
    min_confidence: 0.60
    stack_target_vol: 0.15
    stack_vol_clamp: [0.3, 1.2]
    min_stack_size_factor: 0.5
    stack_micro_threshold: 0.0
    cooldown_minutes: 0
    min_stack_r: 0.5
    stack_spacing_r: 0.5
    stack_sl_tighten: 0.5
    breakeven_threshold_r: 0.5
    trail_activate_r: 1.0
    trail_distance_r: 1.0
    trail_step_r: 0.25
    adx_threshold: 25
    size_cap: 1.0
    stack_max_risk_growth: 1.0
  portfolio_max_leverage: 2.0
  portfolio_leverage_tolerance: 0.001
  net_short_concentration_threshold: 0.75
  spread_gate:
    enabled: true
    staleness_secs: 300
    min_observe_cycles: 720
    tiers:
      fx_major: 10
      fx_cross: 20
      indices: 15
      metals: 20
  entry_optimization:
    mom_max_pressure: 0.9
    mom_min_pressure: 0.1
    mr_extreme_high: 0.85
    mr_extreme_low: 0.15
    breakout_max_compression: 0.05
optimizations:
  truncate_inference: auto
  batch_http: true
  sqlite_state: true
  vectorized_labels: true
  async_diagnostics: true
  regime_conviction_flip_gate:
    enabled: true
    regime_margin_threshold: 0.35
    confidence_threshold: 0.5
    min_bars_in_regime: 3
execution:
  governance:
    regime_geometry:
      GREEN:
        sl_mult: 1.0
        tp_mult: 1.0
      YELLOW:
        sl_mult: 1.0
        tp_mult: 1.0
      RED:
        sl_mult: 1.0
        tp_mult: 1.0
    liquidity_config:
      enabled: true
      regime_window: 21
      refresh_on_open: true
      volume_z_thin_threshold: -1.5
      volume_z_stressed_threshold: -3.0
      amihud_high_threshold: 1.5
      amihud_stressed_threshold: 4.0
      thin_sl_widen_pct: 15
      thin_size_reduce_pct: 15
      stressed_sl_widen_pct: 30
      stressed_size_reduce_pct: 30
      stressed_halt: true
    narrative_config:
      enabled: true
      fxstreet_url: https://www.fxstreet.com/analysis
      geopol_sl_widen_pct: 10
      risk_off_size_reduce_pct: 20
      min_confidence: 0.6
      auto_confirm_deadline_hour: 12
