capital: 100000
position_size: 0.95
rebalance: daily
retrain_freq: annual
retrain_window: 5
research_mode: false
meta_labeling:
  confidence_threshold: 0.40
  threshold_reduced: 0.40
portfolio_drawdown_limit: -0.15
defaults:
  churn_ratio_threshold: 0.35
  cooldown_half_life_hours: 4.0
  cooldown_max_penalty_pct: 20.0
  entry_defer_max_bars: 5
  min_flip_interval_bars: 3
  entry_optimization:
    mom_max_pressure: 0.90
    mom_min_pressure: 0.10
    mr_extreme_high: 0.85
    mr_extreme_low: 0.15
    breakout_max_compression: 0.05
execution:
  governance:
    regime_geometry:
      GREEN:
        sl_mult: 1.0
        tp_mult: 1.0
      YELLOW:
        sl_mult: 0.9
        tp_mult: 0.8
      RED:
        sl_mult: 0.8
        tp_mult: 0.5
    liquidity_config:
      enabled: true
      regime_window: 21
      refresh_on_open: true
      volume_z_thin_threshold: -1.5
      volume_z_stressed_threshold: -2.5
      amihud_high_threshold: 1.5
      amihud_stressed_threshold: 3.0
      thin_sl_widen_pct: 15
      thin_size_reduce_pct: 15
      stressed_sl_widen_pct: 30
      stressed_size_reduce_pct: 30
      stressed_halt: true
    narrative_config:
      enabled: true
      fxstreet_url: "https://www.fxstreet.com/analysis"
      geopol_sl_widen_pct: 10
      risk_off_size_reduce_pct: 20
      min_confidence: 0.6
      auto_confirm_deadline_hour: 12
satellite:
  BTC:
    max_allocation_pct: 0.05
    vol_target: 0.4
    max_drawdown_pct: -0.25
    ticker: BTC-USD
    sl_mult: 0.58
    tp_mult: 1.51
    regime_sizing: true
    execution_config:
      base_spread_bps: 2.0
      spread_vol_slope: 3.0
      spread_max_bps: 150.0
      avg_daily_volume: 50000000000
      impact_coeff: 0.05
    features:
    - rate_diff
    - 2y_yield_delta_63
    - vix_delta_5
    - dxy_mom_21
    - vix_ma21
    - btc_mom_10
    - btc_mom_21
    - btc_vs_spy_21
    - btc_mom_63
    - btc_vs_spy_63
    config:
      min_confidence: 50
      max_holding_days: 30
      dynamic_sltp:
        enabled: true
        method: atr
        atr_period: 7
        atr_mult_sl: 2.5
        atr_mult_tp: 3.0
        min_rr_ratio: 1.2
        calibration_scale: 1.2
        auto_calibrate: true
        trailing_activation_mult: 2.0
        trailing_distance_mult: 3.0
        use_gap_protection: true
      meta_labeling:
        enabled: true
        threshold: 0.5
      scale_out:
        enabled: true
        tiers:
        - fraction: 0.25
          multiplier: 0.25
        - fraction: 0.25
          multiplier: 0.5
        - fraction: 0.25
          multiplier: 0.75
        - fraction: 0.25
          multiplier: 1.0
        activate_breakeven_after: 0
