<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantForge · Paper Trading Command Center</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0e17;
  color: #c8d6e5;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  min-height: 100vh;
  padding: 16px;
}
.container { max-width: 1400px; margin: 0 auto; }

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px; background: linear-gradient(135deg, #0d1520 0%, #162033 100%);
  border: 1px solid #1e3a5f; border-radius: 8px; margin-bottom: 16px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-title { font-size: 18px; font-weight: 700; color: #4fc3f7; letter-spacing: 1px; }
.header-title span { color: #7c4dff; }
.header-badge {
  padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
  background: #1b5e20; color: #81c784; border: 1px solid #2e7d32;
}
.header-right { display: flex; align-items: center; gap: 20px; }
.header-time { color: #78909c; font-size: 13px; }
.header-time .date { color: #b0bec5; }
.header-status { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.status-text { color: #81c784; font-size: 12px; }

/* Cards Grid */
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.card {
  background: linear-gradient(135deg, #0d1520 0%, #111d2e 100%);
  border: 1px solid #1a2d44; border-radius: 8px; padding: 16px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg, transparent, #4fc3f7, transparent);
}
.card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; margin-bottom: 8px; }
.card-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.card-sub { font-size: 11px; color: #78909c; }
.card-buy .card-value { color: #4caf50; }
.card-sell .card-value { color: #ef5350; }
.card-flat .card-value { color: #ffa726; }
.card-buy .card-title { color: #4caf50; }
.card-sell .card-title { color: #ef5350; }
.card-flat .card-title { color: #ffa726; }

/* Main Signal Table */
.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: #546e7a; margin-bottom: 10px; padding-left: 4px;
}
table {
  width: 100%; border-collapse: collapse; margin-bottom: 16px;
  background: #0d1520; border: 1px solid #1a2d44; border-radius: 8px; overflow: hidden;
}
th {
  padding: 10px 12px; text-align: left; font-size: 10px;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: #546e7a; background: #0a111f; border-bottom: 1px solid #1a2d44;
  font-weight: 600;
}
td {
  padding: 10px 12px; border-bottom: 1px solid #111d2e; font-size: 13px;
}
tr:last-child td { border-bottom: none; }
tr:hover { background: rgba(79,195,247,0.03); }
tr.active-row { background: rgba(79,195,247,0.05); }

.signal-buy { color: #4caf50; font-weight: 700; }
.signal-sell { color: #ef5350; font-weight: 700; }
.signal-flat { color: #ffa726; }
.conf-bar {
  display: inline-block; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, #1a3a5c, #4fc3f7);
  min-width: 10px; vertical-align: middle; margin-right: 6px;
}

/* Metrics Section */
.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.metric-card {
  background: #0d1520; border: 1px solid #1a2d44; border-radius: 8px; padding: 14px;
}
.metric-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.metric-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; }
.metric-asset { font-size: 10px; color: #78909c; background: #111d2e; padding: 2px 8px; border-radius: 3px; }
.metric-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.metric-label { color: #78909c; }
.metric-value { color: #b0bec5; font-weight: 600; }
.metric-value.ok { color: #4caf50; }
.metric-value.warn { color: #ffa726; }
.metric-value.fail { color: #ef5350; }

/* Halt Conditions */
.halt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.halt-card {
  background: #0d1520; border: 1px solid #1a2d44; border-radius: 8px;
  padding: 12px; text-align: center;
}
.halt-card .halt-icon { font-size: 20px; margin-bottom: 4px; }
.halt-card .halt-label { font-size: 10px; color: #546e7a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.halt-card .halt-value { font-size: 16px; font-weight: 700; }
.halt-card .halt-value.pass { color: #4caf50; }
.halt-card .halt-value.fail { color: #ef5350; }

/* Advisory Footer */
.advisory {
  background: linear-gradient(135deg, #0d1520, #0f1a2b);
  border: 1px solid #1a2d44; border-radius: 8px; padding: 14px 18px;
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.advisory-text { color: #78909c; font-size: 12px; }
.advisory-text strong { color: #b0bec5; }
.advisory-badge {
  padding: 4px 12px; border-radius: 4px; font-size: 11px;
  background: rgba(79,195,247,0.1); color: #4fc3f7; border: 1px solid rgba(79,195,247,0.3);
}

/* Loading State */
.loading {
  text-align: center; padding: 60px 20px; color: #546e7a;
}
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid #1a2d44;
  border-top: 3px solid #4fc3f7; border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  text-align: center; padding: 40px; color: #ef5350;
}

/* Responsive */
@media (max-width: 900px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .metrics-grid { grid-template-columns: 1fr; }
  .halt-grid { grid-template-columns: repeat(2, 1fr); }
  .header { flex-direction: column; gap: 12px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="header-title">⚡ QuantForge <span>·</span> Paper Trading</div>
      <div class="header-badge">COMMAND CENTER</div>
    </div>
    <div class="header-right">
      <div class="header-status">
        <span class="status-dot"></span>
        <span class="status-text" id="statusText">Live Market Feed Active</span>
      </div>
      <div class="header-time">
        <span class="date" id="currentDate">—</span> · <span id="currentTime">—</span>
      </div>
      <div class="header-badge" id="portfolioDays">0 days</div>
    </div>
  </div>

  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div>Loading paper trading data...</div>
  </div>

  <div id="dashboardContent" style="display:none;">
    <div class="cards" id="assetCards"></div>

    <div class="section-title">Execution Tickets</div>
    <table id="signalsTable">
      <thead>
        <tr>
          <th>Asset</th>
          <th>Signal</th>
          <th>Confidence</th>
          <th>Last Price</th>
          <th>Entry</th>
          <th>SL</th>
          <th>TP</th>
          <th>Unr. PnL</th>
          <th>Size</th>
          <th>Total Return</th>
          <th>Drawdown</th>
        </tr>
      </thead>
      <tbody id="signalsBody"></tbody>
    </table>

    <div class="section-title">Live Metrics</div>
    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="section-title">Halt Conditions</div>
    <div class="halt-grid" id="haltGrid"></div>

    <div class="advisory">
      <div class="advisory-text" id="advisoryText">
        Loading advisory information...
      </div>
      <span class="advisory-badge" id="advisoryBadge">Paper Trading</span>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';
const REFRESH_INTERVAL = 30000;

function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function formatTime(d) {
  const date = new Date(d);
  return date.toLocaleTimeString('en-US', { hour12: false });
}

function fmt(num, decimals=2) {
  if (num === null || num === undefined || num === Infinity) return '—';
  if (typeof num === 'string') return num;
  return Number(num).toFixed(decimals);
}

function signalClass(signal) {
  if (!signal) return 'flat';
  const s = String(signal).toUpperCase();
  if (s === 'BUY') return 'buy';
  if (s === 'SELL') return 'sell';
  return 'flat';
}

function signalLabel(signal) {
  if (!signal) return 'FLAT';
  return String(signal).toUpperCase();
}

function confidenceColor(conf) {
  if (conf >= 60) return '#4caf50';
  if (conf >= 45) return '#ffa726';
  return '#ef5350';
}

function renderAssetCards(state) {
  const container = document.getElementById('assetCards');
  const assets = state.assets;

  let html = '';
  for (const [name, data] of Object.entries(assets)) {
    const m = data.metrics;
    const sig = data.last_signal;
    const signal = sig ? sig.signal : 'FLAT';
    const conf = sig ? sig.confidence : 0;
    const sc = signalClass(signal);

    let entryLine = '';
    if (m.position) {
      const p = m.position;
      entryLine = ` | Entry: $${fmt(p.entry)} | SL: $${fmt(p.sl)} | TP: $${fmt(p.tp)} | PnL: ${fmt(p.unrealized_pnl)}%`;
    }

    html += `
      <div class="card card-${sc}">
        <div class="card-title">${name} · ${signal} ${m.position ? '⚡' : '◯'}</div>
        <div class="card-value">${fmt(conf, 1)}%</div>
        <div class="card-sub">
          Value: $${fmt(m.current_value)} |
          Return: ${fmt(m.total_return)}% |
          DD: ${fmt(m.drawdown)}%${entryLine}
        </div>
      </div>
    `;
  }

  // Portfolio summary card
  const p = state.portfolio;
  html += `
    <div class="card">
      <div class="card-title">Portfolio · Aggregate</div>
      <div class="card-value" style="color:#4fc3f7;">$${fmt(p.total_value)}</div>
      <div class="card-sub">
        Return: ${fmt(p.total_return)}% |
        Capital: $${fmt(p.capital)} |
        Days: ${p.days_running}
      </div>
    </div>
  `;

  container.innerHTML = html;
}

function renderSignalsTable(state) {
  const tbody = document.getElementById('signalsBody');
  const assets = state.assets;

  let html = '';
  for (const [name, data] of Object.entries(assets)) {
    const m = data.metrics;
    const sig = data.last_signal;
    const signal = sig ? sig.signal : 'FLAT';
    const conf = sig ? sig.confidence : 0;
    const date = sig ? sig.date : '—';
    const close = sig ? sig.close_price : '—';
    const sc = signalClass(signal);
    const pSize = name === 'XLF' ? '0.60' : '0.40';

    const posVal = name === 'XLF' ? '60%' : '40%';

    const pos = m.position;
    const entry = pos ? fmt(pos.entry) : '—';
    const sl = pos ? fmt(pos.sl) : '—';
    const tp = pos ? fmt(pos.tp) : '—';
    const upnl = pos ? fmt(pos.unrealized_pnl) : '—';

    html += `
      <tr class="${signal !== 'FLAT' ? 'active-row' : ''}">
        <td><strong>${name}</strong></td>
        <td class="signal-${sc}">${signalLabel(signal)} ${pos ? '⚡' : ''}</td>
        <td>
          <span class="conf-bar" style="width:${Math.max(conf * 0.6, 5)}px;background:${confidenceColor(conf)}"></span>
          ${fmt(conf, 1)}%
        </td>
        <td>$${fmt(close, conf > 100 ? 0 : 2)}</td>
        <td style="color:#4fc3f7;">${entry}</td>
        <td style="color:#ef5350;">${sl}</td>
        <td style="color:#4caf50;">${tp}</td>
        <td style="color:${pos && pos.unrealized_pnl >= 0 ? '#4caf50' : '#ef5350'}">${upnl}%</td>
        <td>${pSize}</td>
        <td style="color:${m.total_return >= 0 ? '#4caf50' : '#ef5350'}">${fmt(m.total_return)}%</td>
        <td style="color:${m.drawdown > -3 ? '#4caf50' : m.drawdown > -5 ? '#ffa726' : '#ef5350'}">${fmt(m.drawdown)}%</td>
      </tr>
    `;
  }

  tbody.innerHTML = html;
}

function renderMetricsGrid(state) {
  const grid = document.getElementById('metricsGrid');
  const assets = state.assets;

  let html = '';
  for (const [name, data] of Object.entries(assets)) {
    const m = data.metrics;
    const pf = m.profit_factor !== null && m.profit_factor !== undefined && m.profit_factor !== Infinity
      ? fmt(m.profit_factor) : '—';

    html += `
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-title">Performance · ${name}</span>
          <span class="metric-asset">${m.n_trades} trades</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Profit Factor</span>
          <span class="metric-value ${pf !== '—' && parseFloat(pf) >= 1 ? 'ok' : pf !== '—' && parseFloat(pf) < 1 ? 'fail' : ''}">${pf}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Win Rate</span>
          <span class="metric-value">${fmt(m.win_rate)}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Signal Dist (L/S/F)</span>
          <span class="metric-value">${m.signal_distribution.BUY || 0}/${m.signal_distribution.SELL || 0}/${m.signal_distribution.FLAT || 0}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Mean Confidence</span>
          <span class="metric-value">${fmt(m.mean_confidence)}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Mean P(Long)/P(Short)</span>
          <span class="metric-value">${fmt(m.mean_prob_long)}% / ${fmt(m.mean_prob_short)}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Monthly PF</span>
          <span class="metric-value ${m.monthly_pf !== null && m.monthly_pf !== undefined && m.monthly_pf >= 0.7 ? 'ok' : 'warn'}">${m.monthly_pf !== null && m.monthly_pf !== undefined ? fmt(m.monthly_pf) : '—'}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Signal Drought</span>
          <span class="metric-value ${m.signal_drought_days >= 10 ? 'warn' : 'ok'}">${m.signal_drought_days} days</span>
        </div>
      </div>
    `;
  }

  grid.innerHTML = html;
}

function renderHaltGrid(state) {
  const grid = document.getElementById('haltGrid');
  const conditions = state.halt_conditions;
  const assets = state.assets;

  // Aggregate halt status across all assets
  let allDrawdownOk = true, allPFOk = true, allDroughtOk = true;
  let maxDD = 0, minPF = Infinity, maxDrought = 0;

  for (const [name, data] of Object.entries(assets)) {
    const h = data.halt;
    if (!h.drawdown_ok) allDrawdownOk = false;
    if (!h.monthly_pf_ok) allPFOk = false;
    if (!h.drought_ok) allDroughtOk = false;

    const m = data.metrics;
    if (m && m.drawdown < maxDD) maxDD = m.drawdown;
    if (m && m.monthly_pf !== null && m.monthly_pf < minPF) minPF = m.monthly_pf;
    if (m && m.signal_drought_days > maxDrought) maxDrought = m.signal_drought_days;
  }

  grid.innerHTML = `
    <div class="halt-card">
      <div class="halt-icon">📉</div>
      <div class="halt-label">Max Drawdown</div>
      <div class="halt-value ${maxDD > -8 ? 'pass' : 'fail'}">
        ${fmt(maxDD)}% / ${fmt(conditions.drawdown * 100, 0)}%
      </div>
    </div>
    <div class="halt-card">
      <div class="halt-icon">📊</div>
      <div class="halt-label">Monthly PF</div>
      <div class="halt-value ${minPF >= 0.7 ? 'pass' : 'fail'}">
        ${minPF < Infinity ? fmt(minPF) : '—'} / ${fmt(conditions.monthly_pf, 2)}
      </div>
    </div>
    <div class="halt-card">
      <div class="halt-icon">🔇</div>
      <div class="halt-label">Signal Drought</div>
      <div class="halt-value ${maxDrought < conditions.signal_drought ? 'pass' : 'fail'}">
        ${maxDrought}d / ${conditions.signal_drought}d
      </div>
    </div>
    <div class="halt-card">
      <div class="halt-icon">🎯</div>
      <div class="halt-label">Prob Drift</div>
      <div class="halt-value pass">
        < ${fmt(conditions.prob_drift * 100, 0)}%
      </div>
    </div>
  `;
}

function renderAdvisory(state) {
  const text = document.getElementById('advisoryText');
  const badge = document.getElementById('advisoryBadge');

  const p = state.portfolio;
  const today = new Date();
  const gateDate = new Date(today);
  gateDate.setMonth(gateDate.getMonth() + 6);
  const retrainDate = new Date(today.getFullYear() + 1, 0, 1);

  text.innerHTML = `
    <strong>Next retrain:</strong> ${formatDate(retrainDate)} ·
    <strong>Paper started:</strong> ${formatDate(p.start_date)} ·
    <strong>6-month gate:</strong> ${formatDate(gateDate)} ·
    <strong>Deployment cleared:</strong> ${p.deployment_cleared ? '✓ YES' : '✗ NO'} ·
    <strong>Latest signals:</strong> assets use most recent 5yr walk-forward
  `;
  badge.textContent = `Paper Trading · ${p.days_running}d`;
}

function updateDateTime() {
  const now = new Date();
  document.getElementById('currentDate').textContent = formatDate(now);
  document.getElementById('currentTime').textContent = formatTime(now);
}

async function fetchState() {
  try {
    const resp = await fetch(`${API_BASE}/state`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const state = await resp.json();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
    document.getElementById('statusText').textContent = 'Live Market Feed Active';

    renderAssetCards(state);
    renderSignalsTable(state);
    renderMetricsGrid(state);
    renderHaltGrid(state);
    renderAdvisory(state);
    updateDateTime();

    const p = state.portfolio;
    document.getElementById('portfolioDays').textContent = `${p.days_running} days`;

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('statusText').textContent = 'Reconnecting...';
    document.getElementById('statusText').style.color = '#ffa726';
    document.querySelector('.status-dot').style.background = '#ffa726';

    document.getElementById('dashboardContent').innerHTML = `
      <div class="error-state">
        <div style="font-size:28px;margin-bottom:12px;">⚠</div>
        <div>Cannot reach paper trading engine.</div>
        <div style="color:#78909c;font-size:12px;margin-top:8px;">Make sure the server is running on port 5000.</div>
      </div>
    `;
  }
}

fetchState();
setInterval(fetchState, REFRESH_INTERVAL);
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
