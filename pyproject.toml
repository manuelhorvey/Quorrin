[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = [
    "backtests*",
    "configs*",
    "data*",
    "features*",
    "labels*",
    "models*",
    "monitoring*",
    "paper_trading*",
    "portfolio*",
    "quorrin*",
    "risk*",
    "shared*",
    "signals*",
]
exclude = ["tests*", "archive*", "notebooks*"]

[tool.setuptools.package-data]
configs = ["*.yaml"]
data = ["processed/*.parquet", "processed/*.csv", "research/*.json", "research/*.yaml", "research/*.parquet"]


[project]
name = "quorrin"
version = "1.5.0"
description = "Modular quantitative research framework for regime-conditioned equity and FX strategy research"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{name = "Eleven Forge"}]
keywords = ["quantitative-finance", "trading", "machine-learning", "xgboost"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Topic :: Office/Business :: Financial",
]

dependencies = [
    "pandas>=2.3.3,<3.0",
    "numpy>=1.24",
    "yfinance>=0.2",
    "scikit-learn>=1.2",
    "xgboost>=1.7",
    "matplotlib>=3.7",
    "ta>=0.10",
    "pyarrow>=10",
    "scipy>=1.10",
    "statsmodels>=0.14",
    "shap>=0.42",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "hypothesis>=6.0",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "plotly>=5.14",
    "jupyterlab>=4.0",
]

[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
    "__init__.py",
    "archive",
    "backtests",
    "data",
    "diagnostics",
    "docs",
    "equity",
    "models",
    "notebooks",
    "paper_trading/dashboard",
    "scripts",
    "signals",
    "tests",
    "main.py",
]

[tool.ruff.lint]
select = ["I", "E", "F", "W", "UP", "N", "SIM", "BLE"]
# BLE001 grandfathered across most files — 101 violations remain repo-wide.

[tool.ruff.lint.per-file-ignores]
"paper_trading/__init__.py" = ["N999"]
"paper_trading/execution/__init__.py" = ["N999"]
"labels/__init__.py" = ["N999"]
"tests/__init__.py" = ["N999"]
# ML convention: X (uppercase) for feature matrices, y for targets
"paper_trading/asset_engine.py" = ["N803", "N806", "BLE001"]
"paper_trading/asset_inference_pipeline.py" = ["N803", "N806"]
"paper_trading/asset_training_pipeline.py" = ["N803", "N806"]
"paper_trading/serve_handler.py" = ["N802"]
"paper_trading/diagnostics.py" = ["N803", "N806"]
"paper_trading/wrappers.py" = ["N803", "N806"]
# ML convention: X (uppercase) for feature matrices, y for targets
"labels/meta_labels.py" = ["N803", "N806", "BLE001"]
# Research scripts use uppercase X for ML feature matrix convention
"scripts/*.py" = ["N806", "N803"]
"tests/*.py" = ["N806", "N803"]
"shared/*.py" = ["N806", "N803"]
# Pre-existing line length issues (grandfathered)
"paper_trading/decision.py" = ["E501"]
"paper_trading/drift_scoring.py" = ["E501"]
"paper_trading/risk_governance.py" = ["E501"]
"paper_trading/shadow_learning.py" = ["E501"]
"paper_trading/simulation_snapshot.py" = ["E501"]

# Grandfathered BLE001 (blind-except) — 59 files, root-caused in #findings-v2
"labels/generator.py" = ["BLE001"]
